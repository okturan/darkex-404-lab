name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify source, Pages, and release artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Verify source contracts
        run: bun run verify

      - name: Build GitHub Pages output
        run: bun run build

      - name: Verify GitHub Pages output
        run: bun run verify:docs

      - name: Confirm committed Pages output is current
        run: git diff --exit-code -- docs

      - name: Build existing release artifacts
        run: bun run release

      - name: Verify release artifacts
        run: bun run verify:release
